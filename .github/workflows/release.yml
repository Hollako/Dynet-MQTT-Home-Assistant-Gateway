name: Build and Release Firmware

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware for ESP8266 and ESP32
        run: pio run -e esp8266 -e esp32

      - name: Prepare release assets
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          mkdir -p dist
          cp .pio/build/esp8266/firmware.bin "dist/Dynet-MQTT-Gateway-${TAG_NAME}-esp8266.bin"
          cp .pio/build/esp32/firmware.bin "dist/Dynet-MQTT-Gateway-${TAG_NAME}-esp32.bin"

      - name: Create GitHub release and upload binaries
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Dynet-MQTT-Gateway-${{ github.ref_name }}-esp8266.bin
            dist/Dynet-MQTT-Gateway-${{ github.ref_name }}-esp32.bin
          generate_release_notes: true
