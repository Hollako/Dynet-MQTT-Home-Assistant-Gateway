[platformio]
default_envs = d1_mini

[env]
framework = arduino
monitor_speed = 115200
lib_deps =
  knolleary/PubSubClient@^2.8
  bblanchon/ArduinoJson@^6.21.5
; Suppress sign-compare warning from PubSubClient library (third-party, not our code)
build_flags = -Wno-sign-compare

[env:d1_mini]
platform = espressif8266
board = d1_mini
board_build.filesystem = littlefs
board_build.f_cpu = 160000000L                          ; overclock 80→160 MHz
build_flags =
  -Wno-sign-compare
  -DPIO_FRAMEWORK_ARDUINO_LWIP2_LOW_MEMORY              ; smaller lwIP → ~4 KB extra heap
upload_protocol = espota
upload_port = 172.16.0.15
;upload_flags = --auth=your_ota_password

[env:esp32_wroom]
platform = espressif32
board = esp32dev                                        ; ESP-WROOM-32 / generic 38-pin devkit
board_build.filesystem = littlefs
board_build.f_cpu = 160000000L                          ; overclock 80→160 MHz
board_build.partitions = min_spiffs.csv                ; 1.9 MB app + 190 KB SPIFFS → more OTA room
build_flags =
  -Wno-sign-compare
  -DCONFIG_BT_ENABLED=0                               ; disable BLE stack — saves ~100 KB RAM
  -DCONFIG_BLUEDROID_ENABLED=0
  -DCONFIG_BLUEMESH_ENABLED=0
; OTA upload from VS Code / PlatformIO (set your device IP and optional auth)
upload_protocol = espota
upload_port = 172.16.0.13
;upload_flags = --auth=your_ota_password

[env:esp32_d1mini]
platform = espressif32
board = wemos_d1_mini32                                ; ESP32 Wemos D1 Mini
board_build.filesystem = littlefs
board_build.partitions = min_spiffs.csv                ; 1.9 MB app + 190 KB SPIFFS → more OTA room
build_flags =
  -Wno-sign-compare
  -DCONFIG_BT_ENABLED=0                               ; disable BLE stack — saves ~100 KB RAM
  -DCONFIG_BLUEDROID_ENABLED=0
  -DCONFIG_BLUEMESH_ENABLED=0
; OTA upload from VS Code / PlatformIO (set your device IP and optional auth)
upload_protocol = espota
upload_port = 172.16.0.13
;upload_flags = --auth=your_ota_password
